<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulso — Operação Vertical (mapa vivo)</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --panel: #1e2130;
    --panel2: #252a3a;
    --border: #2e3450;
    --accent: #ff6b4a;
    --accent2: #ff9478;
    --text: #e8eaf0;
    --text-muted: #7a819a;
    --team: #4a9eff;
    --client: #4aff8c;
    --platform: #b44aff;
    --deliverable: #ffb84a;
    --font: 'Inter', system-ui, -apple-system, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 12px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--text-muted); font-weight: 400; font-size: 14px; margin-left: 8px; }

  .header-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }

  .btn-reset {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

  .legend {
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: 11px;
    color: var(--text-muted);
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }

  main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* LEFT PANEL */
  .sidebar {
    width: 240px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
    padding: 12px 0;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .group-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 8px 16px 4px;
    margin-top: 4px;
  }

  .flow-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 12px;
    color: var(--text-muted);
    border-left: 2px solid transparent;
  }
  .flow-chip:hover { background: var(--panel2); color: var(--text); }
  .flow-chip.active {
    background: var(--panel2);
    color: var(--accent);
    border-left-color: var(--accent);
  }

  .flow-chip .chip-num {
    width: 18px; height: 18px;
    background: var(--panel2);
    border-radius: 50%;
    font-size: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
    flex-shrink: 0;
    color: var(--text-muted);
  }
  .flow-chip.active .chip-num { background: var(--accent); color: #fff; }

  /* Alças de redimensionamento */
  .resizer-x {
    width: 6px;
    flex-shrink: 0;
    background: var(--border);
    cursor: col-resize;
    transition: background 0.15s;
  }
  .resizer-x:hover, .resizer-x.active { background: var(--accent); }

  .resizer-y {
    height: 6px;
    flex-shrink: 0;
    background: var(--border);
    cursor: row-resize;
    transition: background 0.15s;
  }
  .resizer-y:hover, .resizer-y.active { background: var(--accent); }

  /* CENTER */
  .center {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  #graph-container {
    flex: 1;
    overflow: hidden;
    position: relative;
    cursor: grab;
    touch-action: none;          /* nós tratamos pan/zoom no JS */
  }
  #graph-container.grabbing { cursor: grabbing; }

  #graph-svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Controles de zoom */
  .zoom-controls {
    position: absolute;
    right: 14px;
    bottom: 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 10;
  }
  .zoom-controls button {
    width: 38px; height: 38px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .zoom-controls button:hover { border-color: var(--accent); color: var(--accent); }
  .zoom-controls button:active { transform: scale(0.94); }

  .graph-hint {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--text-muted);
    background: var(--panel);
    padding: 4px 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    pointer-events: none;
    z-index: 6;
    opacity: 0.9;
    transition: opacity 0.4s;
  }
  .graph-hint.hide { opacity: 0; }

  /* BOTTOM PANEL */
  .bottom-panel {
    height: 180px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .bottom-panel::-webkit-scrollbar { width: 4px; }
  .bottom-panel::-webkit-scrollbar-track { background: transparent; }
  .bottom-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .bottom-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .steps-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .step-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 6px 10px;
    background: var(--panel2);
    border-radius: 6px;
    font-size: 12px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .step-num {
    width: 20px; height: 20px;
    background: var(--accent);
    color: #fff;
    border-radius: 50%;
    font-size: 10px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .step-content { flex: 1; }
  .step-path { color: var(--text); font-weight: 500; }
  .step-path .arrow { color: var(--accent); margin: 0 4px; }
  .step-label { color: var(--accent2); font-weight: 600; }
  .step-note { color: var(--text-muted); font-size: 11px; margin-top: 2px; }

  .empty-state {
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    padding: 20px;
  }

  /* SVG Nodes */
  .node-group { cursor: pointer; transition: opacity 0.3s; }
  .node-group.dimmed { opacity: 0.15; }
  .node-group.highlighted { opacity: 1; }

  .node-rect {
    rx: 8; ry: 8;
    transition: filter 0.3s;
  }
  .node-group.highlighted .node-rect {
    filter: drop-shadow(0 0 8px currentColor);
  }

  /* SVG Edges */
  .edge-path {
    fill: none;
    stroke-width: 1.5;
    stroke: var(--border);
    transition: opacity 0.3s, stroke 0.3s;
    marker-end: url(#arrowhead-default);
  }
  .edge-path.dimmed { opacity: 0.05; }
  .edge-path.active {
    stroke: var(--accent);
    stroke-width: 2;
    stroke-dasharray: 6 3;
    animation: dashMove 0.8s linear infinite;
    marker-end: url(#arrowhead-active);
  }

  @keyframes dashMove {
    to { stroke-dashoffset: -18; }
  }

  .edge-label {
    font-size: 10px;
    fill: var(--text-muted);
    transition: opacity 0.3s;
  }
  .edge-label.active { fill: var(--accent2); font-weight: 600; }
  .edge-label.dimmed { opacity: 0.05; }

  .step-badge {
    font-size: 9px;
    font-weight: 700;
    fill: var(--accent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .step-badge.visible { opacity: 1; }

  /* Botão de menu (hambúrguer) — só aparece no mobile */
  .btn-menu {
    display: none;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 18px;
    line-height: 1;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
  }
  /* Scrim escuro atrás da gaveta */
  .scrim {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 40;
  }
  .scrim.show { display: block; }

  .layer-label {
    font-size: 10px;
    fill: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* ==================== RESPONSIVO / MOBILE ==================== */
  @media (max-width: 820px) {
    header { padding: 10px 14px; gap: 10px; flex-wrap: wrap; }
    .btn-menu { display: block; }
    .logo { font-size: 15px; }
    .logo span { display: none; }
    .legend { display: none; }          /* legenda vira conteúdo da gaveta */
    .header-actions { margin-left: auto; }
    .btn-reset { padding: 4px 10px; }

    main { position: relative; }

    /* Sidebar vira gaveta deslizante por cima do conteúdo */
    .sidebar {
      position: absolute;
      top: 0; bottom: 0; left: 0;
      z-index: 50;
      width: 80%;
      max-width: 300px;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      box-shadow: 4px 0 20px rgba(0,0,0,0.4);
    }
    .sidebar.open { transform: translateX(0); }

    /* Painel de passos ganha mais espaço no celular */
    .bottom-panel { height: 42vh; padding: 12px 14px; }
    .step-item { font-size: 13px; }
    .step-note { font-size: 12px; }
    .zoom-controls button { width: 42px; height: 42px; }
    .resizer-x, .resizer-y { display: none; } /* sem redimensionar no celular */
  }

  .sidebar-legend { display: none; }
  @media (max-width: 820px) {
    .sidebar-legend {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .sidebar-legend .legend-item { gap: 8px; }
    .sidebar-legend .legend-dot { width: 10px; height: 10px; }
  }

  /* Alvos de toque maiores + sem hover-dependência em telas de toque */
  @media (hover: none) {
    .flow-chip { padding: 12px 16px; }
    .btn-reset, .btn-menu { min-height: 36px; }
  }
</style>
</head>
<body>

<header>
  <button class="btn-menu" id="btn-menu" aria-label="Abrir fluxos">☰</button>
  <div class="logo">Pulso <span>— Operação Vertical v3 · jornada completa</span></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--team)"></div>Time</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--client)"></div>Cliente</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--platform)"></div>Plataformas & IA</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--deliverable)"></div>Entregável</div>
  </div>
  <div class="header-actions">
    <button class="btn-reset" id="btn-reset">Ver tudo</button>
  </div>
</header>

<main>
  <div class="scrim" id="scrim"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="resizer-x" id="resizer-x" title="Arraste para redimensionar"></div>

  <div class="center">
    <div id="graph-container">
      <svg id="graph-svg" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="zoom-controls">
        <button id="zoom-in" aria-label="Aproximar">+</button>
        <button id="zoom-out" aria-label="Afastar">−</button>
        <button id="zoom-fit" aria-label="Ajustar à tela">⤢</button>
      </div>
      <div class="graph-hint" id="graph-hint">arraste p/ mover · role p/ zoom</div>
    </div>
    <div class="resizer-y" id="resizer-y" title="Arraste para redimensionar"></div>
    <div class="bottom-panel">
      <div class="bottom-title" id="bottom-title">Selecione um fluxo para ver os passos</div>
      <div class="steps-list" id="steps-list">
        <div class="empty-state">Clique em qualquer fluxo no painel esquerdo para explorar o mapa operacional.</div>
      </div>
    </div>
  </div>
</main>

// ============================================================
// LAYOUT CONFIG
// ============================================================
const LAYER_COLORS = {
  team:        { fill: "#1a2a4a", stroke: "#4a9eff", text: "#90c8ff" },
  client:      { fill: "#1a3a2a", stroke: "#4aff8c", text: "#80ff9a" },
  platform:    { fill: "#2a1a4a", stroke: "#b44aff", text: "#d080ff" },
  deliverable: { fill: "#3a2a1a", stroke: "#ffb84a", text: "#ffd080" },
};

const NODE_W = 172;
const NODE_H = 54;
const GAP_X = 30;      // espaço entre nós na mesma camada
const LAYER_GAP = 150; // distância vertical entre camadas
const PAD = 70;        // margem do "mundo"

let worldW = 0, worldH = 0;

// Layout em coordenadas de "mundo" fixas (independem da tela — o zoom/pan cuida do resto)
function buildLayout() {
  const layerOrder = ["team", "client", "platform", "deliverable"];
  const layers = {};
  layerOrder.forEach(l => layers[l] = DATA.nodes.filter(n => n.layer === l));

  // largura do mundo = camada mais larga
  let maxRow = 0;
  layerOrder.forEach(l => {
    const n = layers[l].length;
    if (n) maxRow = Math.max(maxRow, n * NODE_W + (n - 1) * GAP_X);
  });
  worldW = maxRow + PAD * 2;
  worldH = PAD * 2 + (layerOrder.length - 1) * (NODE_H + LAYER_GAP) + NODE_H;

  const positions = {};
  layerOrder.forEach((layer, li) => {
    const nodes = layers[layer];
    const rowW = nodes.length * NODE_W + (nodes.length - 1) * GAP_X;
    const startX = (worldW - rowW) / 2; // centraliza cada camada no mundo
    const y = PAD + li * (NODE_H + LAYER_GAP);
    nodes.forEach((n, i) => {
      const x = startX + i * (NODE_W + GAP_X);
      positions[n.id] = { x, y, cx: x + NODE_W / 2, cy: y + NODE_H / 2 };
    });
  });
  return positions;
}

// ============================================================
// RENDER + VIEWPORT (pan/zoom)
// ============================================================
let currentFlow = null;
let positions = {};
let vp = null;                     // <g> transformado (viewport)
const view = { x: 0, y: 0, k: 1 }; // pan (x,y) + zoom (k)
const K_MIN = 0.25, K_MAX = 2.5;

function applyTransform() {
  if (vp) vp.setAttribute("transform", `translate(${view.x},${view.y}) scale(${view.k})`);
}

function fitView() {
  const c = document.getElementById("graph-container");
  const cw = c.clientWidth, ch = c.clientHeight;
  if (!cw || !ch) return;
  const k = Math.min(cw / worldW, ch / worldH) * 0.95;
  view.k = Math.max(K_MIN, Math.min(K_MAX, k));
  view.x = (cw - worldW * view.k) / 2;
  view.y = (ch - worldH * view.k) / 2;
  applyTransform();
}

function zoomAt(cx, cy, factor) {
  const nk = Math.max(K_MIN, Math.min(K_MAX, view.k * factor));
  const r = nk / view.k;
  view.x = cx - (cx - view.x) * r;
  view.y = cy - (cy - view.y) * r;
  view.k = nk;
  applyTransform();
}

function renderGraph() {
  const svg = document.getElementById("graph-svg");
  const container = document.getElementById("graph-container");
  positions = buildLayout();

  // SVG preenche o container; a navegação é via transform no viewport
  svg.setAttribute("width", "100%");
  svg.setAttribute("height", "100%");
  svg.setAttribute("viewBox", `0 0 ${container.clientWidth} ${container.clientHeight}`);
  svg.replaceChildren();

  // Defs
  const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
  defs.innerHTML = `
    <marker id="arrowhead-default" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2e3450"/>
    </marker>
    <marker id="arrowhead-active" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ff6b4a"/>
    </marker>
  `;
  svg.appendChild(defs);

  // Viewport — tudo que sofre pan/zoom vive aqui dentro
  vp = document.createElementNS("http://www.w3.org/2000/svg", "g");
  vp.id = "viewport";
  svg.appendChild(vp);

  // Layer labels — derivados da 1ª ocorrência de cada camada (robusto a mudanças no DATA)
  const firstOf = layer => {
    const n = DATA.nodes.find(x => x.layer === layer);
    return n && positions[n.id] ? positions[n.id].y - 18 : null;
  };
  const layerLabels = [
    { y: firstOf("team"),        text: "Time Pulso" },
    { y: firstOf("client"),      text: "Cliente" },
    { y: firstOf("platform"),    text: "Plataformas & IA" },
    { y: firstOf("deliverable"), text: "Entregáveis" },
  ];
  layerLabels.forEach(ll => {
    if (!ll.y) return;
    const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
    t.setAttribute("x", PAD - 40);
    t.setAttribute("y", ll.y + 14);
    t.setAttribute("class", "layer-label");
    t.textContent = ll.text;
    vp.appendChild(t);
  });

  // Edges group
  const edgesG = document.createElementNS("http://www.w3.org/2000/svg", "g");
  edgesG.id = "edges-group";
  vp.appendChild(edgesG);

  // Nodes group
  const nodesG = document.createElementNS("http://www.w3.org/2000/svg", "g");
  nodesG.id = "nodes-group";
  vp.appendChild(nodesG);

  // Draw all base edges (faint background)
  const allEdges = new Set();
  DATA.flows.forEach(flow => {
    flow.steps.forEach(step => {
      const key = [step.from, step.to].sort().join("--");
      if (!allEdges.has(key)) {
        allEdges.add(key);
        drawEdge(edgesG, step.from, step.to, "", false, 0);
      }
    });
  });

  // Draw nodes
  DATA.nodes.forEach(node => {
    const pos = positions[node.id];
    if (!pos) return;
    const col = LAYER_COLORS[node.layer];

    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
    g.setAttribute("class", "node-group");
    g.setAttribute("id", `node-${node.id}`);

    const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    rect.setAttribute("x", pos.x);
    rect.setAttribute("y", pos.y);
    rect.setAttribute("width", NODE_W);
    rect.setAttribute("height", NODE_H);
    rect.setAttribute("rx", 8);
    rect.setAttribute("fill", col.fill);
    rect.setAttribute("stroke", col.stroke);
    rect.setAttribute("stroke-width", "1.5");
    rect.setAttribute("class", "node-rect");
    g.appendChild(rect);

    const icon = document.createElementNS("http://www.w3.org/2000/svg", "text");
    icon.setAttribute("x", pos.x + 14);
    icon.setAttribute("y", pos.y + NODE_H / 2 + 1);
    icon.setAttribute("dominant-baseline", "middle");
    icon.setAttribute("font-size", "17");
    icon.textContent = node.icon;
    g.appendChild(icon);

    // Label — sem truncar; quebra em até 2 linhas
    const lines = wrapLabel(node.label, 18);
    const textX = pos.x + 38;
    const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
    label.setAttribute("x", textX);
    label.setAttribute("font-size", "12.5");
    label.setAttribute("font-family", "Inter, system-ui, sans-serif");
    label.setAttribute("fill", col.text);
    label.setAttribute("font-weight", "600");
    const lineH = 14;
    const startY = pos.y + NODE_H / 2 - (lines.length - 1) * lineH / 2;
    lines.forEach((ln, i) => {
      const ts = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
      ts.setAttribute("x", textX);
      ts.setAttribute("y", startY + i * lineH);
      ts.setAttribute("dominant-baseline", "middle");
      ts.textContent = ln;
      label.appendChild(ts);
    });
    g.appendChild(label);

    nodesG.appendChild(g);
  });

  applyFlowHighlight(currentFlow);
}

// Quebra o label em até 2 linhas, priorizando cortar num espaço.
function wrapLabel(text, maxPerLine) {
  if (text.length <= maxPerLine) return [text];
  const words = text.split(" ");
  const l1 = [], l2 = [];
  let cur = l1;
  for (const w of words) {
    if (cur === l1 && (l1.join(" ").length + w.length + 1) > maxPerLine && l1.length) cur = l2;
    cur.push(w);
  }
  let line1 = l1.join(" "), line2 = l2.join(" ");
  if (!line2) return [line1];
  // 2ª linha não pode estourar — trunca só em último caso
  if (line2.length > maxPerLine + 4) line2 = line2.slice(0, maxPerLine + 3) + "…";
  return [line1, line2];
}

function getEdgePath(fromId, toId) {
  const from = positions[fromId];
  const to = positions[toId];
  if (!from || !to) return "";

  const x1 = from.cx;
  const y1 = from.cy + NODE_H / 2;
  const x2 = to.cx;
  const y2 = to.cy - NODE_H / 2;

  // Same layer: curved
  if (Math.abs(y1 - (to.cy + NODE_H / 2)) < 5) {
    const mx = (x1 + x2) / 2;
    const my = y1 - 40;
    return `M${x1},${from.cy} Q${mx},${my} ${x2},${to.cy}`;
  }

  const dy = y2 - y1;
  const cy1 = y1 + dy * 0.4;
  const cy2 = y2 - dy * 0.4;
  return `M${x1},${y1} C${x1},${cy1} ${x2},${cy2} ${x2},${y2}`;
}

let edgeCounter = 0;

function drawEdge(container, fromId, toId, label, isActive, stepNum) {
  const path = getEdgePath(fromId, toId);
  if (!path) return null;

  const from = positions[fromId];
  const to = positions[toId];

  const edgeId = `edge-${fromId}-${toId}-${++edgeCounter}`;

  const pathEl = document.createElementNS("http://www.w3.org/2000/svg", "path");
  pathEl.setAttribute("d", path);
  pathEl.setAttribute("class", `edge-path${isActive ? " active" : ""}`);
  pathEl.setAttribute("id", edgeId);
  container.appendChild(pathEl);

  if (label) {
    const mx = (from.cx + to.cx) / 2;
    const my = (from.cy + to.cy) / 2 - 8;

    const labelEl = document.createElementNS("http://www.w3.org/2000/svg", "text");
    labelEl.setAttribute("x", mx);
    labelEl.setAttribute("y", my);
    labelEl.setAttribute("text-anchor", "middle");
    labelEl.setAttribute("class", `edge-label${isActive ? " active" : ""}`);
    labelEl.setAttribute("font-family", "Inter, system-ui, sans-serif");
    const maxLen = 20;
    labelEl.textContent = label.length > maxLen ? label.slice(0, maxLen) + "…" : label;
    container.appendChild(labelEl);

    if (isActive && stepNum > 0) {
      const badge = document.createElementNS("http://www.w3.org/2000/svg", "text");
      badge.setAttribute("x", mx - 30);
      badge.setAttribute("y", my - 2);
      badge.setAttribute("text-anchor", "middle");
      badge.setAttribute("class", "step-badge visible");
      badge.setAttribute("font-family", "Inter, system-ui, sans-serif");
      badge.textContent = stepNum;
      container.appendChild(badge);
    }
  }

  return pathEl;
}

function applyFlowHighlight(flow) {
  // Reset all nodes
  document.querySelectorAll(".node-group").forEach(g => {
    g.classList.remove("dimmed", "highlighted");
  });

  // Rebuild edges
  const edgesG = document.getElementById("edges-group");
  if (!edgesG) return;
  edgesG.innerHTML = "";

  if (!flow) {
    // Draw all base edges
    const allEdges = new Set();
    DATA.flows.forEach(f => {
      f.steps.forEach(step => {
        const key = [step.from, step.to].sort().join("--");
        if (!allEdges.has(key)) {
          allEdges.add(key);
          drawEdge(edgesG, step.from, step.to, "", false, 0);
        }
      });
    });
    return;
  }

  // Get involved nodes
  const involvedNodes = new Set();
  flow.steps.forEach(s => { involvedNodes.add(s.from); involvedNodes.add(s.to); });

  // Draw background edges dimmed
  const allEdges = new Set();
  DATA.flows.forEach(f => {
    f.steps.forEach(step => {
      const key = [step.from, step.to].sort().join("--");
      if (!allEdges.has(key)) {
        allEdges.add(key);
        const p = drawEdge(edgesG, step.from, step.to, "", false, 0);
        if (p) p.classList.add("dimmed");
      }
    });
  });

  // Draw active edges
  flow.steps.forEach((step, i) => {
    drawEdge(edgesG, step.from, step.to, step.label, true, i + 1);
  });

  // Dim/highlight nodes
  document.querySelectorAll(".node-group").forEach(g => {
    const id = g.id.replace("node-", "");
    if (involvedNodes.has(id)) {
      g.classList.add("highlighted");
    } else {
      g.classList.add("dimmed");
    }
  });
}

// ============================================================
// SIDEBAR
// ============================================================
function renderSidebar() {
  const sidebar = document.getElementById("sidebar");
  sidebar.replaceChildren();

  // Legenda dentro da gaveta (visível só no mobile, via CSS)
  const leg = document.createElement("div");
  leg.className = "sidebar-legend";
  [["--team","Time Pulso"],["--client","Cliente"],["--platform","Plataformas & IA"],["--deliverable","Entregável"]]
    .forEach(([v,t]) => {
      const row = document.createElement("div");
      row.className = "legend-item";
      const dot = document.createElement("div");
      dot.className = "legend-dot";
      dot.style.background = `var(${v})`;
      row.appendChild(dot);
      row.appendChild(document.createTextNode(t));
      leg.appendChild(row);
    });
  sidebar.appendChild(leg);

  const groups = {};
  DATA.flows.forEach(flow => {
    if (!groups[flow.group]) groups[flow.group] = [];
    groups[flow.group].push(flow);
  });

  let globalIdx = 1;
  Object.entries(groups).forEach(([group, flows]) => {
    const label = document.createElement("div");
    label.className = "group-label";
    label.textContent = group;
    sidebar.appendChild(label);

    flows.forEach(flow => {
      const chip = document.createElement("div");
      chip.className = "flow-chip";
      chip.dataset.flowId = flow.id;
      chip.innerHTML = `<span class="chip-num">${globalIdx++}</span>${flow.name}`;
      chip.addEventListener("click", () => { selectFlow(flow.id); closeDrawer(); });
      sidebar.appendChild(chip);
    });
  });
}

// ============================================================
// STEPS PANEL
// ============================================================
function renderSteps(flow) {
  const title = document.getElementById("bottom-title");
  const list = document.getElementById("steps-list");

  if (!flow) {
    title.textContent = "Selecione um fluxo para ver os passos";
    list.innerHTML = '<div class="empty-state">Clique em qualquer fluxo no painel esquerdo para explorar o mapa operacional.</div>';
    return;
  }

  title.textContent = `${flow.name} — ${flow.steps.length} passos`;
  list.innerHTML = flow.steps.map((step, i) => {
    const fromNode = DATA.nodes.find(n => n.id === step.from);
    const toNode = DATA.nodes.find(n => n.id === step.to);
    return `
      <div class="step-item" style="animation-delay:${i * 0.05}s">
        <div class="step-num">${i + 1}</div>
        <div class="step-content">
          <div class="step-path">
            ${fromNode?.icon || ""} <strong>${fromNode?.label || step.from}</strong>
            <span class="arrow">→</span>
            ${toNode?.icon || ""} <strong>${toNode?.label || step.to}</strong>
            <span class="step-label"> · ${step.label}</span>
          </div>
          <div class="step-note">${step.note}</div>
        </div>
      </div>
    `;
  }).join("");
}

// ============================================================
// INTERACTIONS
// ============================================================
function selectFlow(flowId) {
  currentFlow = DATA.flows.find(f => f.id === flowId) || null;

  document.querySelectorAll(".flow-chip").forEach(c => {
    c.classList.toggle("active", c.dataset.flowId === flowId);
  });

  applyFlowHighlight(currentFlow);
  renderSteps(currentFlow);
}

function resetView() {
  currentFlow = null;
  document.querySelectorAll(".flow-chip").forEach(c => c.classList.remove("active"));
  applyFlowHighlight(null);
  renderSteps(null);
}

document.getElementById("btn-reset").addEventListener("click", resetView);

// ============================================================
// PAN + ZOOM
// ============================================================
const graphEl = document.getElementById("graph-container");

let hintShown = true;
function hideHint() {
  if (!hintShown) return;
  hintShown = false;
  const h = document.getElementById("graph-hint");
  if (h) { h.classList.add("hide"); setTimeout(() => h.remove(), 500); }
}

// Zoom com a roda do mouse (para o cursor)
graphEl.addEventListener("wheel", e => {
  e.preventDefault();
  hideHint();
  const r = graphEl.getBoundingClientRect();
  const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  zoomAt(e.clientX - r.left, e.clientY - r.top, factor);
}, { passive: false });

// Arrastar p/ pan. Só captura o ponteiro depois de mover (assim o clique chega no nó).
let dragging = false, moved = false, sx = 0, sy = 0, ox = 0, oy = 0;
graphEl.addEventListener("pointerdown", e => {
  if (e.button !== 0 && e.pointerType === "mouse") return;
  hideHint();
  dragging = true; moved = false;
  sx = e.clientX; sy = e.clientY; ox = view.x; oy = view.y;
});
graphEl.addEventListener("pointermove", e => {
  if (!dragging) return;
  const dx = e.clientX - sx, dy = e.clientY - sy;
  if (!moved && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
    moved = true;
    graphEl.setPointerCapture(e.pointerId);
    graphEl.classList.add("grabbing");
  }
  if (moved) { view.x = ox + dx; view.y = oy + dy; applyTransform(); }
});
function endDrag(e) {
  if (!dragging) return;
  dragging = false;
  graphEl.classList.remove("grabbing");
  if (moved) return; // foi arrasto, não clique
  // Clique num nó → seleciona o fluxo que passa por ele. Clique no vazio → nada.
  const el = document.elementFromPoint(e.clientX, e.clientY);
  const ng = el && el.closest && el.closest(".node-group");
  if (ng) {
    const id = ng.id.replace("node-", "");
    const flow = DATA.flows.find(f => f.steps.some(s => s.from === id || s.to === id));
    if (flow) selectFlow(flow.id);
  }
}
graphEl.addEventListener("pointerup", endDrag);
graphEl.addEventListener("pointercancel", () => { dragging = false; graphEl.classList.remove("grabbing"); });

// Pinça (2 dedos) no mobile
let pinchDist = 0;
graphEl.addEventListener("touchmove", e => {
  if (e.touches.length !== 2) return;
  e.preventDefault();
  const [a, b] = e.touches;
  const d = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
  if (pinchDist) {
    const r = graphEl.getBoundingClientRect();
    const mx = (a.clientX + b.clientX) / 2 - r.left;
    const my = (a.clientY + b.clientY) / 2 - r.top;
    zoomAt(mx, my, d / pinchDist);
  }
  pinchDist = d;
}, { passive: false });
graphEl.addEventListener("touchend", () => { pinchDist = 0; });

// Botões de zoom
function zoomCenter(factor) {
  const r = graphEl.getBoundingClientRect();
  zoomAt(r.width / 2, r.height / 2, factor);
}
document.getElementById("zoom-in").addEventListener("click", () => zoomCenter(1.25));
document.getElementById("zoom-out").addEventListener("click", () => zoomCenter(1 / 1.25));
document.getElementById("zoom-fit").addEventListener("click", fitView);

// ============================================================
// PAINÉIS REDIMENSIONÁVEIS (com tamanho persistente)
// ============================================================
// Atualiza só o viewBox (mantém zoom/pan) quando o container muda de tamanho
function updateViewBox() {
  const c = document.getElementById("graph-container");
  document.getElementById("graph-svg")
    .setAttribute("viewBox", `0 0 ${c.clientWidth} ${c.clientHeight}`);
}

const sidebarResize = document.getElementById("sidebar");
const bottomPanel = document.querySelector(".bottom-panel");

// Alça vertical → largura da sidebar
(() => {
  const rx = document.getElementById("resizer-x");
  let on = false;
  rx.addEventListener("pointerdown", e => {
    on = true; rx.classList.add("active");
    try { rx.setPointerCapture(e.pointerId); } catch (_) {}
    e.preventDefault();
  });
  rx.addEventListener("pointermove", e => {
    if (!on) return;
    const w = Math.max(180, Math.min(520, e.clientX));
    sidebarResize.style.width = w + "px";
    updateViewBox();
  });
  const stop = () => {
    if (!on) return;
    on = false; rx.classList.remove("active");
    localStorage.setItem("pm-sidebar-w", sidebarResize.style.width);
  };
  rx.addEventListener("pointerup", stop);
  rx.addEventListener("pointercancel", stop);
})();

// Alça horizontal → altura do painel de baixo
(() => {
  const ry = document.getElementById("resizer-y");
  let on = false;
  ry.addEventListener("pointerdown", e => {
    on = true; ry.classList.add("active");
    try { ry.setPointerCapture(e.pointerId); } catch (_) {}
    e.preventDefault();
  });
  ry.addEventListener("pointermove", e => {
    if (!on) return;
    const h = Math.max(90, Math.min(window.innerHeight * 0.75, window.innerHeight - e.clientY));
    bottomPanel.style.height = h + "px";
    updateViewBox();
  });
  const stop = () => {
    if (!on) return;
    on = false; ry.classList.remove("active");
    localStorage.setItem("pm-panel-h", bottomPanel.style.height);
  };
  ry.addEventListener("pointerup", stop);
  ry.addEventListener("pointercancel", stop);
})();

// Restaura tamanhos salvos (só no desktop; no mobile a sidebar é gaveta)
function restorePanelSizes() {
  if (window.innerWidth > 820) {
    const sw = localStorage.getItem("pm-sidebar-w");
    if (sw) sidebarResize.style.width = sw;
  }
  const ph = localStorage.getItem("pm-panel-h");
  if (ph) bottomPanel.style.height = ph;
}

// ── Gaveta (mobile) ──
const sidebarEl = document.getElementById("sidebar");
const scrimEl = document.getElementById("scrim");
function openDrawer() { sidebarEl.classList.add("open"); scrimEl.classList.add("show"); }
function closeDrawer() { sidebarEl.classList.remove("open"); scrimEl.classList.remove("show"); }
document.getElementById("btn-menu").addEventListener("click", openDrawer);
scrimEl.addEventListener("click", closeDrawer);

// ============================================================
// INIT + RESIZE
// ============================================================
function init() {
  restorePanelSizes();
  renderSidebar();
  renderGraph();
  fitView();
}

let resizeT = null;
window.addEventListener("resize", () => {
  clearTimeout(resizeT);
  resizeT = setTimeout(() => { renderGraph(); fitView(); }, 120);
});

// Wait for layout to settle
requestAnimationFrame(() => {
  requestAnimationFrame(init);
});
</script>
</body>
